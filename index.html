<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Skills</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body class="bg-[#090909] text-white h-screen flex flex-col overflow-hidden">

  <nav class="flex items-center justify-between px-4 md:px-6 py-4 border-b border-[rgba(0,255,100,0.08)] flex-shrink-0">
    <div class="flex items-center gap-3">
      <button
        id="menu-toggle"
        class="md:hidden font-mono text-[#00ff64] text-lg leading-none px-1 hover:opacity-70 transition-opacity"
        aria-label="Toggle menu"
      >☰</button>
      <span class="font-mono font-bold text-[#00ff64] tracking-widest text-sm">▌ AI SKILLS</span>
    </div>
    <span class="hidden md:inline font-mono text-[rgba(0,255,100,0.3)] text-xs">claude-code · codex</span>
  </nav>

  <div id="sidebar-overlay" class="fixed inset-0 bg-black/60 z-10 hidden md:hidden"></div>

  <div class="flex flex-1 overflow-hidden">
    <aside
      id="sidebar"
      class="fixed md:relative top-0 md:top-auto left-0 h-full md:h-auto z-20 md:z-auto
             w-72 flex-shrink-0 border-r border-[rgba(0,255,100,0.08)] flex flex-col overflow-hidden
             bg-[#0c0c0c] md:bg-[rgba(0,255,100,0.02)]
             -translate-x-full md:translate-x-0 transition-transform duration-200 ease-in-out"
    ></aside>
    <main id="content" class="flex-1 overflow-y-auto"></main>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
